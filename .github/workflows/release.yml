name: release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected .xgc2/product.yml version
        required: true
        type: string
      expected_source_sha:
        description: Expected source commit SHA
        required: true
        type: string
      prepare_action:
        description: Release-train action
        required: false
        default: release
        type: choice
        options:
          - release
          - compatibility-verify
      apt_overlay_url:
        description: Optional release-scoped staging APT base URL
        required: false
        default: ""
        type: string
      dependency_set_digest:
        description: SHA256 of the resolved release-train dependency set
        required: false
        default: ""
        type: string
      run_cpp_quality:
        description: Run C++ quality checks
        required: true
        default: false
        type: boolean
      run_source_tests:
        description: Run source tests
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

env:
  XGC2_APT_OVERLAY_URL: ${{ inputs.apt_overlay_url }}
  XGC2_DEPENDENCY_SET_DIGEST: ${{ inputs.dependency_set_digest }}

jobs:
  prepare-contract:
    name: Validate prepare contract
    runs-on: ubuntu-latest
    steps:
      - name: Validate release-train inputs
        env:
          PREPARE_ACTION: ${{ inputs.prepare_action }}
          APT_OVERLAY_URL: ${{ inputs.apt_overlay_url }}
          DEPENDENCY_SET_DIGEST: ${{ inputs.dependency_set_digest }}
        run: |
          set -euo pipefail
          case "$PREPARE_ACTION" in
            release|compatibility-verify) ;;
            *)
              echo "unsupported prepare_action: $PREPARE_ACTION" >&2
              exit 1
              ;;
          esac
          if [[ -n "$DEPENDENCY_SET_DIGEST" && ! "$DEPENDENCY_SET_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "dependency_set_digest must be empty or 64 lowercase hex characters" >&2
            exit 1
          fi
          if [[ -n "$APT_OVERLAY_URL" && ! "$DEPENDENCY_SET_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "apt_overlay_url requires a dependency_set_digest" >&2
            exit 1
          fi

  release-guard:
    needs: prepare-contract
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate release inputs and packaging metadata
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
          RUN_CPP_QUALITY: ${{ inputs.run_cpp_quality }}
          RUN_SOURCE_TESTS: ${{ inputs.run_source_tests }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Releases may only be dispatched from refs/heads/main; got $GITHUB_REF" >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_VERSION" =~ ^[0-9A-Za-z][0-9A-Za-z.+:~_-]{0,127}$ ]]; then
            echo "expected_version is not a valid package version" >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "expected_source_sha must be 40 lowercase hex characters" >&2
            exit 1
          fi
          product_version="$(awk -F': *' '/^version:/ {print $2; exit}' .xgc2/product.yml)"
          if [[ "$product_version" != "$EXPECTED_VERSION" ]]; then
            echo "product version $product_version != expected $EXPECTED_VERSION" >&2
            exit 1
          fi

          source_sha="$(git rev-parse HEAD)"
          if [[ "$source_sha" != "$EXPECTED_SOURCE_SHA" ]]; then
            echo "HEAD $source_sha != expected source SHA $EXPECTED_SOURCE_SHA" >&2
            exit 1
          fi

          git diff --check HEAD
          ./.xgc2/scripts/check_package_compliance.sh

          if [[ "$RUN_CPP_QUALITY" == "true" ]]; then
            echo "No C++ sources are owned by this packaging repository."
          fi
          if [[ "$RUN_SOURCE_TESTS" == "true" ]]; then
            echo "The production build and installed-package smoke test are the source test gate."
          fi

  deb-build-and-smoke:
    name: deb-${{ matrix.distribution }}-${{ matrix.architecture }}
    needs: release-guard
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distribution: focal
            ubuntu_version: "20.04"
            architecture: amd64
            runner: ubuntu-latest
          - distribution: focal
            ubuntu_version: "20.04"
            architecture: arm64
            runner: ubuntu-24.04-arm
          - distribution: jammy
            ubuntu_version: "22.04"
            architecture: amd64
            runner: ubuntu-latest
          - distribution: jammy
            ubuntu_version: "22.04"
            architecture: arm64
            runner: ubuntu-24.04-arm
          - distribution: noble
            ubuntu_version: "24.04"
            architecture: amd64
            runner: ubuntu-latest
          - distribution: noble
            ubuntu_version: "24.04"
            architecture: arm64
            runner: ubuntu-24.04-arm
    defaults:
      run:
        shell: bash
    env:
      EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
      EXPECTED_VERSION: ${{ inputs.expected_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build, install, and smoke-test release-train deb
        run: |
          set -euo pipefail
          ./.xgc2/scripts/build_deb_in_docker.sh \
            --ubuntu-version "${{ matrix.ubuntu_version }}" \
            --architecture "${{ matrix.architecture }}" \
            --work-dir "$RUNNER_TEMP/lichtblick-${{ matrix.distribution }}-${{ matrix.architecture }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Create release-train build manifest
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source lichtblick.lock
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir debs \
            --output-dir .ci/build-manifests \
            --product xgc2-lichtblick \
            --product-version "$EXPECTED_VERSION" \
            --distribution "${{ matrix.distribution }}" \
            --architecture "${{ matrix.architecture }}" \
            --source-sha "$EXPECTED_SOURCE_SHA" \
            --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" \
            --ci-workflow-ref "$GITHUB_WORKFLOW_REF" \
            --upstream-repository "$LICHTBLICK_REPOSITORY" \
            --upstream-ref "$LICHTBLICK_REF" \
            --upstream-sha "$LICHTBLICK_SHA"

      - name: Upload normalized release input
        if: ${{ inputs.prepare_action == 'release' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xgc2-lichtblick-${{ matrix.distribution }}-${{ matrix.architecture }}-release-input
          path: |
            debs/*.deb
            .ci/build-manifests/*.json
          retention-days: 14
          if-no-files-found: error
          include-hidden-files: true
